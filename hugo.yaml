baseURL: "https://qinzhanqi.github.io/Test_cordex/"
title: "Wang Zhen's Home"
theme: "LoveIt"

defaultContentLanguage: "en"
defaultContentLanguageInSubdir: true
hasCJKLanguage: true
languageCode: "en"
enableRobotsTXT: true
enableEmoji: true
enableGitInfo: true
summaryLength: 70

pagination:
  pagerSize: 10

timeZone: "Asia/Shanghai"

taxonomies:
  category: categories
  tag: tags
  series: series

permalinks:
  posts: "/posts/:year/:month/:slug/"

outputs:
  home:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
    - RSS
  taxonomy:
    - HTML
    - RSS
  term:
    - HTML
    - RSS

author:
  name: "Wang Zhen"
  email: ""
  link: ""

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 1
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 2
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 3
    - identifier: cv
      name: CV
      url: /cv/
      weight: 4
    - identifier: publication
      name: Publication
      url: /publication/
      weight: 5
    - identifier: about
      name: About
      url: /about/
      weight: 6
    - identifier: github
      name: ""
      url: "https://github.com/qinzhanqi"
      weight: 7
      pre: '<i class="fab fa-github fa-fw"></i>'

languages:
  en:
    weight: 1
    languageCode: "en"
    languageName: "English"
    title: "Wang Zhen's Home"
    params:
      description: "Personal academic notes and research blog."
      keywords:
        - Physics
        - Optics
        - Photonics
        - Quantum Optics
        - Ultrafast Laser
      home:
        profile:
          title: "Wang Zhen's Home"
          subtitle: "Physics · Optics · Notes"
  zh-cn:
    weight: 2
    languageCode: "zh-CN"
    languageName: "简体中文"
    title: "王臻的主页"
    menu:
      main:
        - identifier: posts
          name: 文章
          url: /posts/
          weight: 1
        - identifier: tags
          name: 标签
          url: /tags/
          weight: 2
        - identifier: categories
          name: 分类
          url: /categories/
          weight: 3
        - identifier: cv
          name: 简历
          url: /cv/
          weight: 4
        - identifier: publication
          name: 论文
          url: /publication/
          weight: 5
        - identifier: about
          name: 关于
          url: /about/
          weight: 6
        - identifier: github
          name: ""
          url: "https://github.com/qinzhanqi"
          weight: 7
          pre: '<i class="fab fa-github fa-fw"></i>'
    params:
      description: "个人学术笔记与研究博客。"
      keywords:
        - 物理
        - 光学
        - 光子学
        - 量子光学
        - 飞秒激光
      home:
        profile:
          title: "王臻的主页"
          subtitle: "物理 · 光学 · 笔记"

params:
  version: "0.2.X"
  defaultTheme: "auto"
  gitRepo: ""
  fingerprint: ""
  dateFormat: "2006-01-02"
  images:
    - /images/avatar.png

  app:
    title: "Wang Zhen's Home"
    noFavicon: false
    svgFavicon: ""
    themeColor: "#ffffff"
    iconColor: "#5bbad5"
    tileColor: "#da532c"

  search:
    enable: true
    type: "lunr"
    contentLength: 4000
    placeholder: "Search"
    maxResultLength: 10
    snippetLength: 30
    highlightTag: "em"
    absoluteURL: false

  header:
    desktopMode: "fixed"
    mobileMode: "auto"
    title:
      logo: ""
      name: "Wang Zhen's Home"
      pre: ""
      post: ""
      typeit: false

  footer:
    enable: true
    custom: ""
    hugo: false
    copyright: true
    author: true
    since: 2026
    icp: ""
    license: '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  section:
    paginate: 20
    dateFormat: "01-02"
    rss: 10

  list:
    paginate: 20
    dateFormat: "01-02"
    rss: 10

  home:
    rss: 10
    profile:
      enable: true
      gravatarEmail: ""
      avatarURL: "/images/avatar.png"
      title: "Wang Zhen's Home"
      subtitle: "Physics · Optics · Notes"
      typeit: true
      social: true
      disclaimer: ""
    posts:
      enable: true
      paginate: 10

  social:
    GitHub: "qinzhanqi"
    Email: ""
    RSS: true

  page:
    hiddenFromHomePage: false
    hiddenFromSearch: false
    twemoji: false
    lightgallery: true
    ruby: true
    fraction: true
    fontawesome: true
    linkToMarkdown: false
    rssFullText: false

    toc:
      enable: true
      auto: true
      keepStatic: false

    code:
      copy: true
      maxShownLines: 50

    table:
      sort: true

    math:
      enable: true
      inlineLeftDelimiter: ""
      inlineRightDelimiter: ""
      blockLeftDelimiter: ""
      blockRightDelimiter: ""
      copyTex: true
      mhchem: true
      mathjax:
        enable: false
      katex:
        enable: true
        autoRender: true
        errorColor: "#cc0000"
        macros: {}

    mapbox:
      accessToken: ""
      lightStyle: "mapbox://styles/mapbox/light-v10"
      darkStyle: "mapbox://styles/mapbox/dark-v10"
      navigation: true
      geolocate: true
      scale: true
      fullscreen: true

    share:
      enable: true
      Twitter: true
      Facebook: true
      Linkedin: true
      Whatsapp: true
      Pinterest: false
      Tumblr: false
      HackerNews: false
      Reddit: false
      VK: false
      Buffer: false
      Xing: false
      Line: false
      Instapaper: false
      Pocket: false
      Flipboard: false
      Weibo: true
      Blogger: false
      Baidu: false
      Odnoklassniki: false
      Evernote: false
      Skype: false
      Trello: false
      Mix: false

    comment:
      enable: false

    library:
      css: {}
      js: {}

    seo:
      images: []
      publisher:
        name: "Wang Zhen"
        logoUrl: "/images/avatar.png"

  typeit:
    speed: 100
    cursorSpeed: 1000
    cursorChar: "|"
    duration: -1

  verification:
    google: ""
    bing: ""
    yandex: ""
    pinterest: ""
    baidu: ""
    so: ""
    sogou: ""

  seo:
    image: "/images/avatar.png"
    thumbnailUrl: "/images/avatar.png"

  analytics:
    enable: true
    google:
      id: ""
      anonymizeIP: true
    fathom:
      id: ""
      server: ""
    baidu:
      id: ""
    umami:
      data_website_id: ""
      src: ""
      data_host_url: ""
      data_domains: ""
    plausible:
      data_domain: ""
      src: ""
    cloudflare:
      token: ""
    splitbee:
      enable: false
      no_cookie: true
      do_not_track: true
    busuanzi:
      enable: true
      siteViews: true
      pageViews: true

  cookieconsent:
    enable: false

  cdn:
    data: ""

  compatibility:
    polyfill: false
    objectFit: false

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

privacy:
  googleAnalytics:
    anonymizeIP: true
    respectDoNotTrack: true
    useSessionStorage: false
  twitter:
    enableDNT: true
  youtube:
    privacyEnhanced: true