baseURL: "https://qinzhanqi.github.io/"
title: "QZQ"
theme: "LoveIt"

languageCode: "zh-CN"
defaultContentLanguage: "zh-cn"
defaultContentLanguageInSubdir: false

hasCJKLanguage: true
locale: "zh-CN"
enableRobotsTXT: true
enableEmoji: true
enableGitInfo: true
summaryLength: 70
timeZone: "Asia/Shanghai"

pagination:
  pagerSize: 10

taxonomies:
  category: categories

permalinks:
  posts: "/posts/:year/:month/:slug/"

outputs:
  home:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
    - RSS
  taxonomy:
    - HTML
    - RSS
  term:
    - HTML
    - RSS

author:
  name: "QZQ"
  email: ""
  link: ""

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 1

    - identifier: categories
      name: 分类
      url: /categories/
      weight: 2

params:
  version: "0.3.X"
  defaultTheme: "auto"
  gitRepo: ""
  fingerprint: ""
  dateFormat: "2006-01-02"

  images:
    - /images/avatar.png

  app:
    noFavicon: false
    svgFavicon: ""
    themeColor: "#ffffff"
    iconColor: "#5bbad5"
    tileColor: "#da532c"

  search:
    enable: true
    type: "lunr"
    contentLength: 4000
    placeholder: "搜索"
    maxResultLength: 10
    snippetLength: 30
    highlightTag: "em"
    absoluteURL: false

  header:
    desktopMode: "fixed"
    mobileMode: "auto"
    title:
      logo: ""
      name: "QZQ"
      pre: ""
      post: ""
      typeit: false

  footer:
    enable: true
    custom: ""
    hugo: false
    copyright: true
    author: true
    since: 2026
    icp: ""
    license: ""

  section:
    paginate: 20
    dateFormat: "01-02"
    rss: 10

  list:
    paginate: 20
    dateFormat: "01-02"
    rss: 10

  home:
    rss: 10
    profile:
      enable: true
      gravatarEmail: ""
      avatarURL: "/images/a.jpg"
      title: "QZQ"
      subtitle: "Qzq20010609"
      typeit: true
      social: false
      disclaimer: ""

    posts:
      enable: true
      paginate: 10

  social:
    RSS: false

  page:
    hiddenFromHomePage: false
    hiddenFromSearch: false
    twemoji: false
    lightgallery: true
    ruby: true
    fraction: true
    fontawesome: true
    linkToMarkdown: false
    rssFullText: false

    toc:
      enable: true
      auto: true
      keepStatic: false

    code:
      copy: true
      maxShownLines: 50

    table:
      sort: true

    math:
      enable: true
      inlineLeftDelimiter: ""
      inlineRightDelimiter: ""
      blockLeftDelimiter: ""
      blockRightDelimiter: ""
      copyTex: true
      mhchem: true

      mathjax:
        enable: false

      katex:
        enable: true
        autoRender: true
        errorColor: "#cc0000"
        macros: {}

    share:
      enable: false

    comment:
      enable: false

    library:
      css: {}
      js: {}

    seo:
      images: []
      publisher:
        name: "QZQ"
        logoUrl: "/images/a.jpg"

  typeit:
    speed: 100
    cursorSpeed: 1000
    cursorChar: "|"
    duration: -1

  verification:
    google: ""
    bing: ""
    yandex: ""
    pinterest: ""
    baidu: ""
    so: ""
    sogou: ""

  seo:
    image: "/images/a.jpg"
    thumbnailUrl: "/images/a.jpg"

  analytics:
    enable: false

    google:
      id: ""
      anonymizeIP: true

    fathom:
      id: ""
      server: ""

    baidu:
      id: ""

    umami:
      data_website_id: ""
      src: ""
      data_host_url: ""
      data_domains: ""

    plausible:
      data_domain: ""
      src: ""

    cloudflare:
      token: ""

    splitbee:
      enable: false
      no_cookie: true
      do_not_track: true

    busuanzi:
      enable: false
      siteViews: false
      pageViews: false

  cookieconsent:
    enable: false

  cdn:
    data: ""

  compatibility:
    polyfill: false
    objectFit: false

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true

  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

privacy:
  disqus:
    disable: true

  googleAnalytics:
    disable: true
    respectDoNotTrack: true

  instagram:
    disable: true
    simple: true

  vimeo:
    disable: true
    enableDNT: true
    simple: true

  x:
    disable: true
    enableDNT: true
    simple: true

  youTube:
    disable: false
    privacyEnhanced: true